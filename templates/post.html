{% extends "layout.html" %}

{% block title %}{{post.title}}{% endblock %}

{% block meta %}
<meta property="og:title" content="{{post.title}}">

{% if post.description %}
<meta property="og:description" content="{{post.description}}">
{% endif %}

{% endblock %}

{% block content %}
<article>
  <aside>
    <time>{{post['date'].strftime('%B %d, %Y')}}</time> - <a href="/">view all posts</a>
  </aside>
  <h1>{{post.title}}</h1>
  <content>
    {{content}}
  </content>
</article>
{% endblock %}
